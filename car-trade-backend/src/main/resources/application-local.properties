# ==================== Local Dev ====================
#
# 重要安全提示：
#   - 真实密钥请勿提交到 git；本文件中的值仅供"个人开发机本地"参考
#   - 推荐做法：把真实密钥放在 .env.local（加入 .gitignore），用 export 注入
#   - 任何被推送出去的密钥必须立即去控制台轮换
#   - JWT 密钥在 application.properties 已要求通过 JWT_SECRET 环境变量注入；
#     若此处明文留空，应用启动会因为 fail-fast 阻断（参见 StartupRunner）
# ============================================================

# Disable auto SQL execution (handled by StartupRunner after MyBatis-Plus initialization)
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# Enable automatic schema.sql  initialization on startup (true=on, false=off)
car-trade.init-db=true

# Database — 真实值请通过 DB_URL / DB_USERNAME / DB_PASSWORD 环境变量注入
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/new_car_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&currentSchema=public}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME_LOCAL_DEV}

# Redis — 真实值请通过 REDIS_HOST / REDIS_PASSWORD 环境变量注入
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:CHANGE_ME_LOCAL_DEV}

# JWT — 强制通过环境变量注入（本地启动会被 fail-fast 拒绝）
# jwt.secret=${JWT_SECRET:}

# RocketMQ — 真实值请通过环境变量注入
rocketmq.access-channel=CLOUD
rocketmq.name-server=${ROCKETMQ_NAME_SERVER:localhost:8080}
rocketmq.producer.access-key=${ROCKETMQ_ACCESS_KEY:CHANGE_ME_LOCAL_DEV}
rocketmq.producer.secret-key=${ROCKETMQ_SECRET_KEY:CHANGE_ME_LOCAL_DEV}
rocketmq.producer.group=car-trade-msg-group
rocketmq.producer.namespaceV2=${ROCKETMQ_NAMESPACE:}
rocketmq.producer.send-message-timeout=5000
rocketmq.consumer.access-key=${ROCKETMQ_ACCESS_KEY:CHANGE_ME_LOCAL_DEV}
rocketmq.consumer.secret-key=${ROCKETMQ_SECRET_KEY:CHANGE_ME_LOCAL_DEV}

# MyBatis-Plus SQL log
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Logging
logging.level.root=INFO
logging.level.com.pancosky.newcartrade=DEBUG
logging.level.org.springframework.web=INFO
logging.level.io.lettuce.core=WARN
logging.level.com.zaxxer.hikari=INFO
# 把启动日志写到文件，便于排查（关闭 dev 模式请删除此行）
logging.file.name=logs/backend-local.log

# Alibaba Cloud SLS
sls.endpoint=${SLS_ENDPOINT:}
sls.project=${SLS_PROJECT:}
sls.logstore=${SLS_LOGSTORE:}
sls.access-key-id=${SLS_ACCESS_KEY_ID:}
sls.access-key-secret=${SLS_ACCESS_KEY_SECRET:}

# AI (Volcengine Ark / coding/v3 package) — 真实值请通过环境变量注入
ai.enabled=${AI_ENABLED:true}
ai.api-key=${AI_API_KEY:CHANGE_ME_LOCAL_DEV}
ai.base-url=${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/coding/v3}
ai.model=${AI_MODEL:doubao-seed-2.0-lite}
ai.timeout-seconds=60

# Demo 模式：仅 local/test profile 下允许
app.demo-mode=true

# 本地开发：关闭登录锁定，避免调试时因为反复输错密码被锁
security.login-lock.enabled=false
security.login-lock.max-fails=5
security.login-lock.lock-minutes=5