# ==================== Base Config ====================
server.port=${SERVER_PORT:8080}

spring.application.name=car-trade-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000

# SQL Init
#spring.sql.init.mode=always
#spring.sql.init.schema-locations=classpath:schema.sql
#spring.sql.init.data-locations=classpath:data-cities.sql

# Redis
spring.redis.timeout=2000
spring.redis.connect-timeout=2000
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=2

# Jackson
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Messages encoding
spring.messages.encoding=UTF-8

# JWT
jwt.expiration=${JWT_EXPIRATION:86400}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800}
jwt.issuer=${JWT_ISSUER:5d-car-trade}
# 注意：jwt.secret 不在默认配置中暴露；通过环境变量 JWT_SECRET 注入，缺失时 JwtUtil 启动 fail-fast

# CORS 允许的 Origin 白名单（逗号分隔）。生产环境必须通过 CORS_ALLOWED_ORIGINS 注入
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080}

# 图片代理域名白名单（逗号分隔），空 = 仅做内网黑名单
car.proxy.image-domains=${CAR_PROXY_IMAGE_DOMAINS:}

# Demo 模式（开启后允许静默注册与默认验证码）。生产严禁为 true
app.demo-mode=${APP_DEMO_MODE:false}

# ==================== 登录锁定 ====================
# 连续密码错误后临时锁定账户，防暴力破解。
# 具体 profile 文件可覆盖以下默认值；local/test 建议关闭以方便调试。
#
# security.login-lock.enabled   总开关：true=开启 / false=关闭（同时关闭写入 failCount）
# security.login-lock.max-fails 触发锁定所需的连续密码错误次数（默认 5）
# security.login-lock.lock-minutes  锁定时长（分钟，默认 5）
security.login-lock.enabled=${LOGIN_LOCK_ENABLED:true}
security.login-lock.max-fails=${LOGIN_LOCK_MAX_FAILS:5}
security.login-lock.lock-minutes=${LOGIN_LOCK_LOCK_MINUTES:5}

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.pancosky.newcartrade.entity
mybatis-plus.type-handlers-package=com.pancosky.newcartrade.handler
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=AUTO

# API prefix
api.prefix=/api/v1
