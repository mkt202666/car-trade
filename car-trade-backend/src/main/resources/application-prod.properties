# ==================== Production ====================
#
# 强约束：所有密钥必须通过环境变量注入；缺失则启动 fail-fast
# ============================================================

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:?DB_HOST required}:${DB_PORT:5432}/${DB_NAME:new_car_trade}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&currentSchema=public
spring.datasource.username=${DB_USERNAME:?DB_USERNAME required}
spring.datasource.password=${DB_PASSWORD:?DB_PASSWORD required}
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000

# Redis
spring.redis.host=${REDIS_HOST:?REDIS_HOST required}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:?REDIS_PASSWORD required}
spring.redis.lettuce.pool.max-active=50
spring.redis.lettuce.pool.max-idle=20
spring.redis.lettuce.pool.min-idle=5

# JWT — 强制通过环境变量注入；强度由 StartupRunner.assertSecretValid 校验
jwt.secret=${JWT_SECRET:?JWT_SECRET required (>=32 bytes, no default values)}
jwt.expiration=${JWT_EXPIRATION:86400}

# RocketMQ
rocketmq.access-channel=CLOUD
rocketmq.name-server=${ROCKETMQ_NAMESRV:?ROCKETMQ_NAMESRV required}
rocketmq.producer.access-key=${ROCKETMQ_AK:?ROCKETMQ_AK required}
rocketmq.producer.secret-key=${ROCKETMQ_SK:?ROCKETMQ_SK required}
rocketmq.producer.group=car-trade-msg-group
rocketmq.producer.namespaceV2=${ROCKETMQ_NS}
rocketmq.producer.send-message-timeout=5000
rocketmq.consumer.access-key=${ROCKETMQ_AK}
rocketmq.consumer.secret-key=${ROCKETMQ_SK}

# MyBatis-Plus disable SQL log
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl

# Logging
logging.level.root=WARN
logging.level.com.pancosky.newcartrade=INFO
logging.level.org.springframework.web=WARN

# Alibaba Cloud SLS
sls.endpoint=${SLS_ENDPOINT:cn-shanghai.log.aliyuncs.com}
sls.project=${SLS_PROJECT:new-car-trade}
sls.logstore=${SLS_LOGSTORE:application-log}
sls.access-key-id=${SLS_ACCESS_KEY_ID:?SLS_ACCESS_KEY_ID required}
sls.access-key-secret=${SLS_ACCESS_KEY_SECRET:?SLS_ACCESS_KEY_SECRET required}

# AI (DeepSeek)
ai.enabled=${AI_ENABLED:true}
ai.api-key=${AI_API_KEY:?AI_API_KEY required}
ai.base-url=${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/coding/v3}
ai.model=${AI_MODEL:deepseek-v4-pro}
ai.timeout-seconds=30

# 生产环境严禁 demo 模式
app.demo-mode=false

# 生产环境：启用更强的锁定策略
# 连续 5 次密码错误即锁定 15 分钟，防暴力破解与撞库
security.login-lock.enabled=true
security.login-lock.max-fails=5
security.login-lock.lock-minutes=15