# ==================== 生产环境 ====================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:new_car_trade}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&currentSchema=public
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 600000
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400

rocketmq:
  access-channel: CLOUD
  name-server: ${ROCKETMQ_NAMESRV}
  producer:
    access-key: ${ROCKETMQ_AK}
    secret-key: ${ROCKETMQ_SK}
    group: car-trade-msg-group
    namespaceV2: ${ROCKETMQ_NS}
    send-message-timeout: 5000
  consumer:
    access-key: ${ROCKETMQ_AK}
    secret-key: ${ROCKETMQ_SK}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: WARN
    com.pancosky.newcartrade: INFO
    org.springframework.web: WARN

# 阿里云 SLS 日志配置
sls:
  endpoint: ${SLS_ENDPOINT:cn-shanghai.log.aliyuncs.com}
  project: ${SLS_PROJECT:new-car-trade}
  logstore: ${SLS_LOGSTORE:application-log}
  access-key-id: ${SLS_ACCESS_KEY_ID:}
  access-key-secret: ${SLS_ACCESS_KEY_SECRET:}
