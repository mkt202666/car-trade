# ==================== Base Config ====================
server.port=${SERVER_PORT:8081}

spring.application.name=car-trade-admin-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Datasource (shares the same database with mobile backend)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000

# Redis (shares the same Redis with mobile backend)
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.database=${REDIS_DATABASE:0}

# Jackson
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Messages encoding
spring.messages.encoding=UTF-8

# JWT (shared secret with mobile backend)
jwt.expiration=${JWT_EXPIRATION:7200}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800}
jwt.issuer=${JWT_ISSUER:5d-car-trade-admin}
# jwt.secret MUST be set via JWT_SECRET environment variable (>= 32 chars for HS256)
# DO NOT use default values - this will fail at startup if not set
jwt.secret=${JWT_SECRET}

# CORS - Admin frontend default port 5174
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5174,http://127.0.0.1:5174}

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.pancosky.cartradeadmin.entity
mybatis-plus.type-handlers-package=com.pancosky.cartradeadmin.handler
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=AUTO
mybatis-plus.global-config.db-config.logic-not-delete-value=null
mybatis-plus.global-config.db-config.logic-delete-value=NOW()

# API prefix
api.prefix=/api/v1/admin

# SpringDoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.show-actuator=false
