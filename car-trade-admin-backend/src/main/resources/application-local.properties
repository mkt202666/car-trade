# ==================== Local Dev ====================
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=never

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}
spring.redis.password=${REDIS_PASSWORD}
# JWT - shared secret via environment variable
# jwt.secret=${JWT_SECRET:}

# MyBatis-Plus SQL log
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Logging
logging.level.root=INFO
logging.level.com.pancosky.cartradeadmin=DEBUG
logging.level.org.springframework.web=INFO
logging.level.io.lettuce.core=WARN
logging.level.com.zaxxer.hikari=INFO
logging.file.name=logs/admin-backend-local.log

# Demo mode - local only
app.demo-mode=true

# Login lock - disabled for local dev
security.login-lock.enabled=false
security.login-lock.max-fails=5
security.login-lock.lock-minutes=5
